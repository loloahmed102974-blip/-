<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model26 Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الكارت الرئيسي */
        .main-card {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 25px;
            transition: all 0.5s ease;
        }

        .main-card h1 {
            color: #333333;
            margin-bottom: 5px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .main-card p {
            color: #777777;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .main-image-box {
            width: 100%;
            height: 450px;
            border-radius: 10px;
            overflow: hidden;
            background-color: #e0e0e0;
        }

        .main-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 35px;
            background-color: #ff4a5a;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #e03e4d;
            transform: scale(1.05);
        }

        /* شاشة المعرض الافتراضية (مخفية في البداية) */
        .gallery-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(244, 244, 249, 0.98);
            z-index: 1000;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* تفعيل ظهور المعرض */
        .gallery-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .gallery-container h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 30px;
        }

        /* شبكة الصور */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        /* زر الإغلاق */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1001;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background-color: #ff4a5a;
        }
    </style>
</head>
<body>

    <div class="main-card" id="mainCard">
        <h1>فضايح لولو</h1>
        
        <div class="main-image-box">
            <img src="https://i.ibb.co/MxyJw34N/image.jpg" alt="Model Main">
        </div>
        <button class="btn" onclick="openGallery()">View Portfolio</button>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <button class="close-btn" onclick="closeGallery()">✕ Close</button>
        
        <div class="gallery-container">
            <h2>فضايح لولو</h2>
            
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://i.ibb.co/MxyJw34N/image.jpg" alt="Model 1">
                </div>
                <div class="gallery-item">
                    <img src="https://i.ibb.co/zhyyrgC1/image.jpg" alt="Model 2">
                </div>
                <div class="gallery-item">
                    <img src="https://i.ibb.co/9Hm0rwTy/image.jpg" alt="Model 3">
                </div>
            </div>
        </div>
    </div>

    <script>
        function openGallery() {
            document.getElementById('galleryOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            document.getElementById('galleryOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
